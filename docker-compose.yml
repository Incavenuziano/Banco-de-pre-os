services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bancodeprecos
      POSTGRES_PASSWORD: bancodeprecos_dev
      POSTGRES_DB: bancodeprecos
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bancodeprecos"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bancodeprecos:bancodeprecos_dev@db:5432/bancodeprecos
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:3000"
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    depends_on:
      - backend

volumes:
  pgdata:
